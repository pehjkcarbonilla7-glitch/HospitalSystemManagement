<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration — Apollo Hospital</title>

    <link rel="stylesheet" href="register.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>

    <div style="padding:16px;">
        <a href="index.html" class="btn btn-outline">← Back to Home</a>
    </div>

    <div class="container" style="margin-top:10px">

        <div class="card">
            <h2>Patient Registration</h2>
            <p class="small-muted">Fill in the patient's details below.</p>

            <!-- ✅ FORM -->
            <form id="registerForm" style="margin-top:12px; display:grid; grid-template-columns:repeat(2,1fr); gap:14px">

                <!-- FIRST NAME -->
                <div>
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>

                <!-- MIDDLE NAME -->
                <div>
                    <label>Middle Name</label>
                    <input type="text" id="middleName">
                </div>

                <!-- LAST NAME -->
                <div>
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>

                <!-- DOB -->
                <div>
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <!-- GENDER -->
                <div>
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Choose...</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- CIVIL STATUS -->
                <div>
                    <label>Civil Status</label>
                    <select id="civilStatus" required>
                        <option value="">Choose...</option>
                        <option>Single</option>
                        <option>Married</option>
                        <option>Widowed</option>
                    </select>
                </div>

                <!-- ADDRESS -->
                <div style="grid-column:span 2">
                    <label>Address</label>
                    <input type="text" id="address" required>
                </div>

                <!-- PHONE -->
                <div>
                    <label>Contact Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <!-- EMAIL -->
                <div>
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <!-- TERMS -->
                <div style="grid-column:span 2; display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" required>
                    <label>I confirm all details entered are true and valid.</label>
                </div>

                <!-- BUTTONS -->
                <div style="grid-column:span 2; display:flex; justify-content:flex-end; gap:12px">
                    <button type="reset" class="btn btn-outline">Reset</button>
                    <button type="submit" class="btn btn-primary">Submit & Continue</button>
                </div>

            </form>
        </div>

    </div>

    <!-- ✅ API SCRIPT -->
    <script>
        const API = "https://localhost:7029/api";

        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const data = {
                firstName: document.getElementById("firstName").value,
                middleName: document.getElementById("middleName").value,
                lastName: document.getElementById("lastName").value,
                dateOfBirth: document.getElementById("dob").value,
                gender: document.getElementById("gender").value,
                civilStatus: document.getElementById("civilStatus").value,
                address: document.getElementById("address").value,
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value
            };

            try {
                const res = await fetch(API + "/Patient", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("✅ Patient Registered!");
                    window.location.href = "registration-successfull.html";
                } else {
                    const err = await res.text();
                    alert("❌ Error: " + err);
                }

            } catch (err) {
                console.error(err);
                alert("❌ Server Error");
            }
        });
    </script>

</body>
</html>
